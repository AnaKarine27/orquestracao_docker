<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo de Produtos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <header>
        <div class="header-left">
          <h1>Catálogo de Produtos</h1>
          <p>Controle de Estoque</p>
        </div>
      </header>

      <div class="layout">
        <aside class="sidebar">
          <p class="sidebar-header">Novo produto</p>
          <form id="produtoForm">
            <div class="field">
              <label for="nome">Nome do produto</label>
              <input
                type="text"
                id="nome"
                placeholder="Ex: Fone de ouvido"
                required
              />
            </div>
            <div class="field">
              <label for="preco">Preço (R$)</label>
              <input
                type="number"
                step="0.01"
                id="preco"
                placeholder="0,00"
                required
              />
            </div>
            <div class="field-sep"></div>
            <div class="field">
              <label for="imagem_url">URL da imagem</label>
              <input
                type="url"
                id="imagem_url"
                placeholder="https://exemplo.com/img.jpg"
              />
            </div>
            <div class="field">
              <label for="descricao">Descrição</label>
              <textarea
                id="descricao"
                rows="3"
                placeholder="Descrição do produto…"
              ></textarea>
            </div>
            <button type="submit" class="btn-submit">Cadastrar produto</button>
          </form>
        </aside>

        <main>
          <div class="panel-header">
            <h2 class="panel-title">Itens disponíveis</h2>
          </div>
          <div id="listaProdutos" class="products-grid">
            <div class="empty">
              <div class="empty-icon">○</div>
              Carregando produtos…
              <div class="divider"></div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
  <script>
      const form = document.getElementById("produtoForm");
      const lista = document.getElementById("listaProdutos");

      async function carregarProdutos() {
        const res = await fetch("/api/produtos");
        const produtos = await res.json();
        lista.innerHTML = "";

        if (produtos.length === 0) {
          lista.innerHTML = `
            <div class="empty">
              <div class="empty-icon">↻</div>
              Nenhum produto cadastrado.
              <div class="divider"></div>
            </div>`;
          return;
        }

        produtos.forEach((p) => {
          const imagem = p.imagem_url
            ? p.imagem_url
            : "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=400&auto=format&fit=crop";

          lista.innerHTML += `
            <div class="card">
              <div class="card-img">
                <img src="${imagem}" alt="${p.nome}" onerror="this.src='https://placehold.co/400x300?text=Sem+Imagem'" />
              </div>
              <div class="card-body">
                <p class="card-name">${p.nome}</p>
                <p class="card-desc">${p.descricao || "Nenhuma descrição disponível para este produto."}</p>
                <div class="card-footer">
                  <div>
                    <span class="price-label">R$ </span><span class="price">${parseFloat(p.preco).toFixed(2)}</span>
                  </div>
                </div>
              </div>
            </div>`
            ;
        });
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const nome = document.getElementById("nome").value;
        const preco = document.getElementById("preco").value;
        const descricao = document.getElementById("descricao").value;
        const imagem_url = document.getElementById("imagem_url").value;

        const btn = form.querySelector("button");
        const btnText = btn.innerHTML;
        btn.innerHTML = "Aguardando...";
        btn.disabled = true;

        await fetch("/api/produtos", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nome, preco, descricao, imagem_url }),
        });

        form.reset();
        btn.innerHTML = btnText;
        btn.disabled = false;
        carregarProdutos();
      });

      carregarProdutos();
    </script>
</html>
